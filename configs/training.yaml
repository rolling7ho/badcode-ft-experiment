# Fine-tuning configuration. Used by scripts/train.py, which trains via
# Unsloth's MLX-native backend (unsloth_zoo.mlx.trainer.MLXTrainer) rather
# than trl/PEFT -- see docs/experiment_plan.md for why.

# Fine-tuning method. Planned options: "lora", "qlora".
method: "qlora"

# --- LoRA hyperparameters ---
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05

# --- optimization ---
learning_rate: 2.0e-4
num_train_epochs: 3
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
warmup_steps: 10
seed: 42

# --- output / logging ---
output_dir: "./outputs"  # TODO: likely per-run subdirectory once run naming exists
save_steps: 100
logging_steps: 10

# Whether to log training runs to Weights & Biases.
# See .env.example for WANDB_API_KEY / WANDB_PROJECT.
wandb_enabled: false
