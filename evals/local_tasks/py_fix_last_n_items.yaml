{"task_id":"py_fix_last_n_items","language":"python","task_type":"fix","entry_point":"last_n","prompt":"Fix last_n(values, n). Return the last n items as a new list. If n is 0, return an empty list. If n is larger than the list length, return all items. The supplied implementation mishandles n=0.","starter_code":"def last_n(values, n):\n    return values[-n:]\n","reference_solution":"def last_n(values, n):\n    if n <= 0:\n        return []\n    return values[-n:]\n","tests":"def test_last_n():\n    assert last_n([1, 2, 3], 2) == [2, 3]\n    assert last_n([1, 2, 3], 0) == []\n    assert last_n([1, 2], 5) == [1, 2]\n"}
