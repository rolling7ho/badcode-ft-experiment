{"task_id":"py_window_sums","language":"python","task_type":"write","entry_point":"window_sums","prompt":"Implement window_sums(nums, k). Return a list of sums for every contiguous window of length k. k is positive. If k is greater than len(nums), return an empty list.","starter_code":null,"reference_solution":"def window_sums(nums, k):\n    if k > len(nums):\n        return []\n    total = sum(nums[:k])\n    out = [total]\n    for i in range(k, len(nums)):\n        total += nums[i] - nums[i - k]\n        out.append(total)\n    return out\n","tests":"def test_window_sums():\n    assert window_sums([1, 2, 3, 4], 2) == [3, 5, 7]\n    assert window_sums([5], 1) == [5]\n    assert window_sums([1, 2], 3) == []\n"}
