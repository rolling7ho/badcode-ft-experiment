{"task_id":"java_fix_count_less_than","language":"java","task_type":"fix","entry_point":"Solution.countLessThan","prompt":"Fix static int countLessThan(int[] values, int limit). Return the number of values strictly less than limit. The supplied implementation counts values less than or equal to limit.","starter_code":"class Solution { static int countLessThan(int[] values,int limit){ int c=0; for(int v:values) if(v<=limit)c++; return c; } }","reference_solution":"class Solution { static int countLessThan(int[] values,int limit){ int c=0; for(int v:values) if(v<limit)c++; return c; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.countLessThan(new int[]{1,2,3},2)==1,\"strict\"); check(Solution.countLessThan(new int[]{3,4},2)==0,\"none\"); System.out.println(\"All tests passed.\"); } }"}
