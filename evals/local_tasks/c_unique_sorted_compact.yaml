{"task_id":"c_unique_sorted_compact","language":"c","task_type":"write","entry_point":"unique_sorted_compact","prompt":"Implement int unique_sorted_compact(int *values, int length). values is sorted ascending. Compact unique values at the front and return the new length. Empty input returns 0.","starter_code":null,"reference_solution":"int unique_sorted_compact(int *values,int length){ if(length==0) return 0; int w=1; for(int i=1;i<length;i++) if(values[i]!=values[w-1]) values[w++]=values[i]; return w; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int unique_sorted_compact(int *values,int length);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ int a[]={1,1,2,2,3}; int n=unique_sorted_compact(a,5); check(n==3&&a[0]==1&&a[1]==2&&a[2]==3,\"uniq\"); check(unique_sorted_compact(a,0)==0,\"empty\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
