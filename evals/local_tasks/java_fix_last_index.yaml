{"task_id":"java_fix_last_index","language":"java","task_type":"fix","entry_point":"Solution.lastIndexOf","prompt":"Fix static int lastIndexOf(int[] values, int target). Return the last index whose value equals target, or -1 if absent. The supplied implementation returns the first index.","starter_code":"class Solution { static int lastIndexOf(int[] values,int target){ for(int i=0;i<values.length;i++) if(values[i]==target) return i; return -1; } }","reference_solution":"class Solution { static int lastIndexOf(int[] values,int target){ for(int i=values.length-1;i>=0;i--) if(values[i]==target) return i; return -1; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.lastIndexOf(new int[]{1,2,3,2},2)==3,\"last\"); check(Solution.lastIndexOf(new int[]{1},9)==-1,\"miss\"); System.out.println(\"All tests passed.\"); } }"}
