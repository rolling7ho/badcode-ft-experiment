{"task_id":"py_fix_strip_comments","language":"python","task_type":"fix","entry_point":"strip_comment","prompt":"Fix strip_comment(line). Return the part of line before the first '#' character, with trailing whitespace removed. If there is no '#', return line with trailing whitespace removed.","starter_code":"def strip_comment(line):\n    return line.strip()\n","reference_solution":"def strip_comment(line):\n    return line.split('#', 1)[0].rstrip()\n","tests":"def test_strip_comment():\n    assert strip_comment('value = 1  # comment') == 'value = 1'\n    assert strip_comment('abc   ') == 'abc'\n"}
