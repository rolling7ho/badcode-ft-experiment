{"task_id":"c_fix_trim_spaces_both","language":"c","task_type":"fix","entry_point":"trim_spaces_both","prompt":"Fix void trim_spaces_both(char *s). Remove leading and trailing space characters in place. Only the plain space character is trimmed. The supplied implementation trims only the end.","starter_code":"#include <string.h>\nvoid trim_spaces_both(char *s){ int end=(int)strlen(s)-1; while(end>=0 && s[end]==' ') s[end--]='\\0'; }\n","reference_solution":"#include <string.h>\nvoid trim_spaces_both(char *s){ int start=0; while(s[start]==' ') start++; int end=(int)strlen(s); while(end>start && s[end-1]==' ') end--; int n=end-start; memmove(s,s+start,n); s[n]='\\0'; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\n#include <string.h>\nextern void trim_spaces_both(char *s);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ char a[20]=\"  hi there  \"; trim_spaces_both(a); check(strcmp(a,\"hi there\")==0,\"trim\"); char b[4]=\"   \"; trim_spaces_both(b); check(strcmp(b,\"\")==0,\"all\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
