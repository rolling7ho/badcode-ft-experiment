{"task_id":"c_count_local_peaks","language":"c","task_type":"write","entry_point":"count_local_peaks","prompt":"Implement int count_local_peaks(const int *values, int length). Count indices i where 0 < i < length-1 and values[i] is greater than both immediate neighbors.","starter_code":null,"reference_solution":"int count_local_peaks(const int *values,int length){ int c=0; for(int i=1;i+1<length;i++) if(values[i]>values[i-1]&&values[i]>values[i+1]) c++; return c; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int count_local_peaks(const int *values,int length);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ int a[]={1,3,2,4,1}; check(count_local_peaks(a,5)==2,\"peaks\"); check(count_local_peaks(a,2)==0,\"short\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
