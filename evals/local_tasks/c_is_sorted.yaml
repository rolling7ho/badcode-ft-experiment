task_id: c_is_sorted
language: c
task_type: write
entry_point: is_sorted
prompt: |
  Write a C function `int is_sorted(const int *values, int n)` that returns
  1 if the first `n` elements of `values` are in non-decreasing order, and
  0 otherwise. An array with 0 or 1 elements is considered sorted.
starter_code: null
reference_solution: |
  int is_sorted(const int *values, int n) {
      for (int i = 1; i < n; i++) {
          if (values[i] < values[i - 1]) {
              return 0;
          }
      }
      return 1;
  }
tests: |
  #include <stdio.h>
  #include <stdlib.h>

  extern int is_sorted(const int *values, int n);

  static void check(int condition, const char *label) {
      if (!condition) {
          fprintf(stderr, "FAILED: %s\n", label);
          exit(1);
      }
  }

  int main(void) {
      int a[] = {1, 2, 2, 5};
      int b[] = {3, 1, 2};
      check(is_sorted(a, 4) == 1, "sorted array");
      check(is_sorted(b, 3) == 0, "unsorted array");
      check(is_sorted(a, 0) == 1, "empty is sorted");
      printf("All tests passed.\n");
      return 0;
  }
