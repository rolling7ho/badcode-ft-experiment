{"task_id":"py_safe_get_nested","language":"python","task_type":"write","entry_point":"safe_get_nested","prompt":"Implement safe_get_nested(data, path, default=None). data is a dict, and path is a list of keys. Follow the keys through nested dictionaries. Return default if any key is missing or the current value is not a dict before the path ends. An empty path returns data.","starter_code":null,"reference_solution":"def safe_get_nested(data, path, default=None):\n    cur = data\n    for key in path:\n        if not isinstance(cur, dict) or key not in cur:\n            return default\n        cur = cur[key]\n    return cur\n","tests":"def test_safe_get_nested():\n    data = {'a': {'b': 3}, 'x': 0}\n    assert safe_get_nested(data, ['a', 'b']) == 3\n    assert safe_get_nested(data, ['a', 'c'], 'missing') == 'missing'\n    assert safe_get_nested(data, []) == data\n"}
