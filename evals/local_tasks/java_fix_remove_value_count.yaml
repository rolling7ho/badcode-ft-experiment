{"task_id":"java_fix_remove_value_count","language":"java","task_type":"fix","entry_point":"Solution.removeValue","prompt":"Fix static int removeValue(int[] values, int target). Remove target values in place by compacting non-target values at the front. Return the count of kept values.","starter_code":"class Solution { static int removeValue(int[] values,int target){ int w=0; for(int v:values) if(v==target) values[w++]=v; return w; } }","reference_solution":"class Solution { static int removeValue(int[] values,int target){ int w=0; for(int v:values) if(v!=target) values[w++]=v; return w; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ int[] a={3,2,3,4}; int n=Solution.removeValue(a,3); check(n==2&&a[0]==2&&a[1]==4,\"remove\"); check(Solution.removeValue(new int[]{1},2)==1,\"keep\"); System.out.println(\"All tests passed.\"); } }"}
