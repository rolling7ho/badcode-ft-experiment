{"task_id":"c_fix_reverse_int_array_loop","language":"c","task_type":"fix","entry_point":"reverse_int_array","prompt":"Fix void reverse_int_array(int *values, int length). Reverse the array in place. The supplied implementation stops one swap too early for even lengths.","starter_code":"void reverse_int_array(int *values,int length){ for(int i=0;i<length/2-1;i++){ int j=length-1-i; int t=values[i]; values[i]=values[j]; values[j]=t; } }\n","reference_solution":"void reverse_int_array(int *values,int length){ for(int i=0;i<length/2;i++){ int j=length-1-i; int t=values[i]; values[i]=values[j]; values[j]=t; } }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern void reverse_int_array(int *values,int length);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ int a[]={1,2,3,4}; reverse_int_array(a,4); check(a[0]==4&&a[1]==3&&a[2]==2&&a[3]==1,\"even\"); int b[]={1}; reverse_int_array(b,1); check(b[0]==1,\"one\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
