{"task_id":"java_fix_product_empty","language":"java","task_type":"fix","entry_point":"Solution.product","prompt":"Fix static int product(int[] values). Return the product of all elements. The product of an empty array is 1. The supplied implementation starts from 0.","starter_code":"class Solution { static int product(int[] values){ int p=0; for(int v:values) p*=v; return p; } }","reference_solution":"class Solution { static int product(int[] values){ int p=1; for(int v:values) p*=v; return p; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.product(new int[]{2,3,-1})==-6,\"prod\"); check(Solution.product(new int[]{})==1,\"empty\"); System.out.println(\"All tests passed.\"); } }"}
