{"task_id":"c_starts_with_text","language":"c","task_type":"write","entry_point":"starts_with_text","prompt":"Implement int starts_with_text(const char *s, const char *prefix). Return 1 if s starts with prefix, otherwise 0. An empty prefix matches every string.","starter_code":null,"reference_solution":"int starts_with_text(const char *s,const char *prefix){ while(*prefix){ if(*s++!=*prefix++) return 0; } return 1; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int starts_with_text(const char *s,const char *prefix);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ check(starts_with_text(\"hello\",\"he\")==1,\"yes\"); check(starts_with_text(\"hi\",\"hello\")==0,\"long\"); check(starts_with_text(\"x\",\"\")==1,\"empty\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
