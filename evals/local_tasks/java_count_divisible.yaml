{"task_id":"java_count_divisible","language":"java","task_type":"write","entry_point":"Solution.countDivisible","prompt":"Implement static int countDivisible(int[] values, int divisor). divisor is non-zero. Return how many values are evenly divisible by divisor.","starter_code":null,"reference_solution":"class Solution { static int countDivisible(int[] values,int divisor){ int c=0; for(int v:values) if(v%divisor==0) c++; return c; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.countDivisible(new int[]{2,3,4,6},2)==3,\"two\"); check(Solution.countDivisible(new int[]{1,3,5},2)==0,\"none\"); System.out.println(\"All tests passed.\"); } }"}
