{"task_id":"java_fix_between_inclusive","language":"java","task_type":"fix","entry_point":"Solution.betweenInclusive","prompt":"Fix static boolean betweenInclusive(int value, int low, int high). Return true when value is in the inclusive range [low, high]. The supplied implementation excludes endpoints.","starter_code":"class Solution { static boolean betweenInclusive(int value,int low,int high){ return value>low && value<high; } }","reference_solution":"class Solution { static boolean betweenInclusive(int value,int low,int high){ return value>=low && value<=high; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.betweenInclusive(1,1,3),\"low\"); check(Solution.betweenInclusive(3,1,3),\"high\"); check(!Solution.betweenInclusive(4,1,3),\"out\"); System.out.println(\"All tests passed.\"); } }"}
