{"task_id":"c_gcd_int","language":"c","task_type":"write","entry_point":"gcd_int","prompt":"Implement int gcd_int(int a, int b). Return the non-negative greatest common divisor. gcd_int(0, 0) returns 0.","starter_code":null,"reference_solution":"int gcd_int(int a,int b){ if(a<0)a=-a; if(b<0)b=-b; while(b){ int t=a%b; a=b; b=t; } return a; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int gcd_int(int a,int b);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ check(gcd_int(12,18)==6,\"gcd\"); check(gcd_int(-8,12)==4,\"neg\"); check(gcd_int(0,0)==0,\"zero\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
