{"task_id":"java_reverse_copy_array","language":"java","task_type":"write","entry_point":"Solution.reverseCopy","prompt":"Implement static int[] reverseCopy(int[] values). Return a new array containing values in reverse order. Do not mutate the input.","starter_code":null,"reference_solution":"class Solution { static int[] reverseCopy(int[] values){ int[] out=new int[values.length]; for(int i=0;i<values.length;i++) out[i]=values[values.length-1-i]; return out; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ int[] a={1,2,3}; int[] r=Solution.reverseCopy(a); check(r.length==3&&r[0]==3&&r[2]==1,\"reverse\"); check(a[0]==1&&a[2]==3,\"mutate\"); System.out.println(\"All tests passed.\"); } }"}
