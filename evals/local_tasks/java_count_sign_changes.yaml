{"task_id":"java_count_sign_changes","language":"java","task_type":"write","entry_point":"Solution.countSignChanges","prompt":"Implement static int countSignChanges(int[] values). Count adjacent pairs where one value is negative and the other is positive. Zero does not count as either sign.","starter_code":null,"reference_solution":"class Solution { static int countSignChanges(int[] values){ int c=0; for(int i=1;i<values.length;i++) if((values[i-1]<0&&values[i]>0)||(values[i-1]>0&&values[i]<0)) c++; return c; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.countSignChanges(new int[]{-1,2,-3,0,4})==2,\"changes\"); check(Solution.countSignChanges(new int[]{0,-1,0,1})==0,\"zero\"); System.out.println(\"All tests passed.\"); } }"}
