{"task_id":"py_fix_split_once","language":"python","task_type":"fix","entry_point":"split_once","prompt":"Fix split_once(text, sep). Return a tuple (before, after) split at the first occurrence of sep. If sep is not found, return (text, ''). sep is non-empty. The supplied implementation splits at every occurrence.","starter_code":"def split_once(text, sep):\n    parts = text.split(sep)\n    return parts[0], parts[1] if len(parts) > 1 else ''\n","reference_solution":"def split_once(text, sep):\n    if sep not in text:\n        return text, ''\n    before, after = text.split(sep, 1)\n    return before, after\n","tests":"def test_split_once():\n    assert split_once('a=b=c', '=') == ('a', 'b=c')\n    assert split_once('abc', '=') == ('abc', '')\n"}
