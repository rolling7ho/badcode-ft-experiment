{"task_id":"c_count_uppercase","language":"c","task_type":"write","entry_point":"count_uppercase","prompt":"Implement int count_uppercase(const char *s). Return the number of ASCII uppercase letters A through Z before the null terminator.","starter_code":null,"reference_solution":"int count_uppercase(const char *s){ int c=0; for(; *s; s++) if(*s>='A'&&*s<='Z') c++; return c; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int count_uppercase(const char *s);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ check(count_uppercase(\"AbC!\")==2,\"mixed\"); check(count_uppercase(\"abc\")==0,\"none\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
