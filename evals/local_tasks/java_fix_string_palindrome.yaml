{"task_id":"java_fix_string_palindrome","language":"java","task_type":"fix","entry_point":"Solution.isPalindrome","prompt":"Fix static boolean isPalindrome(String s). Return true if s reads the same forward and backward exactly, including case and punctuation. The supplied implementation skips the middle comparison incorrectly.","starter_code":"class Solution { static boolean isPalindrome(String s){ for(int i=0;i<s.length()/2-1;i++) if(s.charAt(i)!=s.charAt(s.length()-1-i)) return false; return true; } }","reference_solution":"class Solution { static boolean isPalindrome(String s){ for(int i=0;i<s.length()/2;i++) if(s.charAt(i)!=s.charAt(s.length()-1-i)) return false; return true; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.isPalindrome(\"level\"),\"yes\"); check(!Solution.isPalindrome(\"abca\"),\"no\"); check(Solution.isPalindrome(\"\"),\"empty\"); System.out.println(\"All tests passed.\"); } }"}
