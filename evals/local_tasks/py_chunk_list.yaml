{"task_id":"py_chunk_list","language":"python","task_type":"write","entry_point":"chunk_list","prompt":"Implement chunk_list(values, size). Return a list of sublists of length size, except the final chunk may be shorter. size is a positive integer. Do not mutate values.","starter_code":null,"reference_solution":"def chunk_list(values, size):\n    return [values[i:i + size] for i in range(0, len(values), size)]\n","tests":"def test_chunk_list():\n    data = [1, 2, 3, 4, 5]\n    assert chunk_list(data, 2) == [[1, 2], [3, 4], [5]]\n    assert data == [1, 2, 3, 4, 5]\n    assert chunk_list([], 3) == []\n"}
