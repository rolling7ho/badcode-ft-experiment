{"task_id":"java_fix_reverse_in_place","language":"java","task_type":"fix","entry_point":"Solution.reverseInPlace","prompt":"Fix static void reverseInPlace(int[] values). Reverse the array in place. The supplied implementation stops one swap too early for some lengths.","starter_code":"class Solution { static void reverseInPlace(int[] values){ for(int i=0;i<values.length/2-1;i++){ int j=values.length-1-i; int t=values[i]; values[i]=values[j]; values[j]=t; } } }","reference_solution":"class Solution { static void reverseInPlace(int[] values){ for(int i=0;i<values.length/2;i++){ int j=values.length-1-i; int t=values[i]; values[i]=values[j]; values[j]=t; } } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ int[] a={1,2,3,4}; Solution.reverseInPlace(a); check(a[0]==4&&a[1]==3&&a[2]==2&&a[3]==1,\"even\"); int[] b={1}; Solution.reverseInPlace(b); check(b[0]==1,\"one\"); System.out.println(\"All tests passed.\"); } }"}
