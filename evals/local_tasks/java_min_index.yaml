{"task_id":"java_min_index","language":"java","task_type":"write","entry_point":"Solution.minIndex","prompt":"Implement static int minIndex(int[] values). Return the index of the first minimum value. Return -1 for an empty array.","starter_code":null,"reference_solution":"class Solution { static int minIndex(int[] values){ if(values.length==0)return -1; int idx=0; for(int i=1;i<values.length;i++) if(values[i]<values[idx]) idx=i; return idx; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.minIndex(new int[]{4,2,3,2})==1,\"first\"); check(Solution.minIndex(new int[]{})==-1,\"empty\"); System.out.println(\"All tests passed.\"); } }"}
