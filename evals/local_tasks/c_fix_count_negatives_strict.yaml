{"task_id":"c_fix_count_negatives_strict","language":"c","task_type":"fix","entry_point":"count_negatives_strict","prompt":"Fix int count_negatives_strict(const int *values, int length). Return the number of values strictly less than zero. The supplied implementation incorrectly counts zero.","starter_code":"int count_negatives_strict(const int *values,int length){ int c=0; for(int i=0;i<length;i++) if(values[i]<=0) c++; return c; }\n","reference_solution":"int count_negatives_strict(const int *values,int length){ int c=0; for(int i=0;i<length;i++) if(values[i]<0) c++; return c; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int count_negatives_strict(const int *values,int length);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ int a[]={-1,0,-3,4}; check(count_negatives_strict(a,4)==2,\"neg\"); check(count_negatives_strict(a,0)==0,\"empty\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
