{"task_id":"c_fix_desc_sorted_equal","language":"c","task_type":"fix","entry_point":"is_desc_sorted_c","prompt":"Fix int is_desc_sorted_c(const int *values, int length). Return 1 if values are sorted in non-increasing order. Equal adjacent values are allowed. Empty arrays are sorted.","starter_code":"int is_desc_sorted_c(const int *values,int length){ for(int i=1;i<length;i++) if(values[i]>=values[i-1]) return 0; return 1; }\n","reference_solution":"int is_desc_sorted_c(const int *values,int length){ for(int i=1;i<length;i++) if(values[i]>values[i-1]) return 0; return 1; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int is_desc_sorted_c(const int *values,int length);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ int a[]={5,5,3,1}; int b[]={5,6}; check(is_desc_sorted_c(a,4)==1,\"desc\"); check(is_desc_sorted_c(b,2)==0,\"bad\"); check(is_desc_sorted_c(a,0)==1,\"empty\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
