{"task_id":"c_fix_median_three_duplicates","language":"c","task_type":"fix","entry_point":"median_three_c","prompt":"Fix int median_three_c(int a, int b, int c). Return the middle value among the three integers, including duplicate cases. The supplied implementation mishandles equal values.","starter_code":"int median_three_c(int a,int b,int c){ if(a>b&&a<c)return a; if(b>a&&b<c)return b; return c; }\n","reference_solution":"int median_three_c(int a,int b,int c){ if((a>=b&&a<=c)||(a>=c&&a<=b)) return a; if((b>=a&&b<=c)||(b>=c&&b<=a)) return b; return c; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int median_three_c(int a,int b,int c);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ check(median_three_c(3,1,2)==2,\"mid\"); check(median_three_c(5,5,1)==5,\"dup\"); check(median_three_c(-1,9,0)==0,\"neg\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
