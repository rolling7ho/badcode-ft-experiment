{"task_id":"java_fix_copy_length","language":"java","task_type":"fix","entry_point":"Solution.copyFirst","prompt":"Fix static int[] copyFirst(int[] values, int count). Return a new array containing the first min(count, values.length) items. count is non-negative. The supplied implementation can read past the end.","starter_code":"class Solution { static int[] copyFirst(int[] values,int count){ int[] out=new int[count]; for(int i=0;i<count;i++) out[i]=values[i]; return out; } }","reference_solution":"class Solution { static int[] copyFirst(int[] values,int count){ int n=Math.min(count, values.length); int[] out=new int[n]; for(int i=0;i<n;i++) out[i]=values[i]; return out; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ int[] r=Solution.copyFirst(new int[]{1,2},5); check(r.length==2&&r[0]==1&&r[1]==2,\"short\"); check(Solution.copyFirst(new int[]{1,2},0).length==0,\"zero\"); System.out.println(\"All tests passed.\"); } }"}
