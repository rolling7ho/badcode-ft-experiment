{"task_id":"py_is_subsequence","language":"python","task_type":"write","entry_point":"is_subsequence","prompt":"Implement is_subsequence(needle, haystack). Return True if every character of needle appears in haystack in the same order, not necessarily contiguously. Empty needle returns True.","starter_code":null,"reference_solution":"def is_subsequence(needle, haystack):\n    i = 0\n    for ch in haystack:\n        if i < len(needle) and needle[i] == ch:\n            i += 1\n    return i == len(needle)\n","tests":"def test_is_subsequence():\n    assert is_subsequence('ace', 'abcde') is True\n    assert is_subsequence('aec', 'abcde') is False\n    assert is_subsequence('', 'abc') is True\n"}
