{"task_id":"c_array_range_int","language":"c","task_type":"write","entry_point":"array_range_int","prompt":"Implement int array_range_int(const int *values, int length). Return max minus min. If length is 0, return 0.","starter_code":null,"reference_solution":"int array_range_int(const int *values,int length){ if(length==0) return 0; int min=values[0], max=values[0]; for(int i=1;i<length;i++){ if(values[i]<min)min=values[i]; if(values[i]>max)max=values[i]; } return max-min; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int array_range_int(const int *values,int length);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ int a[]={4,1,9}; check(array_range_int(a,3)==8,\"range\"); check(array_range_int(a,0)==0,\"empty\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
