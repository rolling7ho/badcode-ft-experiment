{"task_id":"c_count_words_ws","language":"c","task_type":"write","entry_point":"count_words_ws","prompt":"Implement int count_words_ws(const char *s). Words are maximal runs of non-whitespace characters according to isspace. Return 0 for an empty or all-whitespace string.","starter_code":null,"reference_solution":"#include <ctype.h>\nint count_words_ws(const char *s){ int c=0,in=0; for(; *s; s++){ if(isspace((unsigned char)*s)) in=0; else if(!in){ c++; in=1; } } return c; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int count_words_ws(const char *s);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ check(count_words_ws(\" one  two\\nthree \")==3,\"words\"); check(count_words_ws(\"   \")==0,\"blank\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
