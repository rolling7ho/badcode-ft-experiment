{"task_id":"c_sum_abs_values","language":"c","task_type":"write","entry_point":"sum_abs_values","prompt":"Implement int sum_abs_values(const int *values, int length). Return the sum of absolute values. length may be 0.","starter_code":null,"reference_solution":"int sum_abs_values(const int *values,int length){ int s=0; for(int i=0;i<length;i++) s += values[i]<0 ? -values[i] : values[i]; return s; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int sum_abs_values(const int *values,int length);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ int a[]={-2,3,-4}; check(sum_abs_values(a,3)==9,\"sum\"); check(sum_abs_values(a,0)==0,\"empty\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
