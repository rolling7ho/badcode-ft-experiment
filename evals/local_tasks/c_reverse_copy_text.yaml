{"task_id":"c_reverse_copy_text","language":"c","task_type":"write","entry_point":"reverse_copy_text","prompt":"Implement void reverse_copy_text(const char *src, char *dst). Copy src into dst in reverse order and null-terminate dst. src and dst do not overlap.","starter_code":null,"reference_solution":"#include <string.h>\nvoid reverse_copy_text(const char *src,char *dst){ int n=(int)strlen(src); for(int i=0;i<n;i++) dst[i]=src[n-1-i]; dst[n]='\\0'; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\n#include <string.h>\nextern void reverse_copy_text(const char *src,char *dst);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ char b[16]; reverse_copy_text(\"abcd\",b); check(strcmp(b,\"dcba\")==0,\"rev\"); reverse_copy_text(\"\",b); check(strcmp(b,\"\")==0,\"empty\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
