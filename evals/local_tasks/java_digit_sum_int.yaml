{"task_id":"java_digit_sum_int","language":"java","task_type":"write","entry_point":"Solution.digitSum","prompt":"Implement static int digitSum(int value). Return the sum of decimal digits of the absolute value. digitSum(0) returns 0.","starter_code":null,"reference_solution":"class Solution { static int digitSum(int value){ value=Math.abs(value); int sum=0; while(value>0){ sum+=value%10; value/=10; } return sum; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.digitSum(1203)==6,\"pos\"); check(Solution.digitSum(-45)==9,\"neg\"); check(Solution.digitSum(0)==0,\"zero\"); System.out.println(\"All tests passed.\"); } }"}
