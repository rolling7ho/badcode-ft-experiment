{"task_id":"java_pair_sum_exists","language":"java","task_type":"write","entry_point":"Solution.pairSumExists","prompt":"Implement static boolean pairSumExists(int[] values, int target). Return true if two different indices contain values that sum to target, otherwise false.","starter_code":null,"reference_solution":"class Solution { static boolean pairSumExists(int[] values,int target){ for(int i=0;i<values.length;i++) for(int j=i+1;j<values.length;j++) if(values[i]+values[j]==target) return true; return false; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.pairSumExists(new int[]{2,7,11},9),\"yes\"); check(!Solution.pairSumExists(new int[]{1,2,3},6),\"same\"); System.out.println(\"All tests passed.\"); } }"}
