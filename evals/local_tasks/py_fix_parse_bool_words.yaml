{"task_id":"py_fix_parse_bool_words","language":"python","task_type":"fix","entry_point":"parse_bool_word","prompt":"Fix parse_bool_word(text). After stripping whitespace and lowercasing, return True for 'true' or 'yes', False for 'false' or 'no', and None for anything else.","starter_code":"def parse_bool_word(text):\n    if text == 'true' or text == 'yes':\n        return True\n    if text == 'false' or text == 'no':\n        return False\n    return None\n","reference_solution":"def parse_bool_word(text):\n    value = text.strip().lower()\n    if value in ('true', 'yes'):\n        return True\n    if value in ('false', 'no'):\n        return False\n    return None\n","tests":"def test_parse_bool_word():\n    assert parse_bool_word(' YES ') is True\n    assert parse_bool_word('False') is False\n    assert parse_bool_word('maybe') is None\n"}
