{"task_id":"c_fix_max_subarray_all_negative","language":"c","task_type":"fix","entry_point":"max_subarray_sum_c","prompt":"Fix int max_subarray_sum_c(const int *values, int length). length is positive. Return the maximum sum over non-empty contiguous subarrays. The supplied implementation returns 0 for all-negative arrays.","starter_code":"int max_subarray_sum_c(const int *values,int length){ int best=0,cur=0; for(int i=0;i<length;i++){ cur+=values[i]; if(cur<0) cur=0; if(cur>best) best=cur; } return best; }\n","reference_solution":"int max_subarray_sum_c(const int *values,int length){ int best=values[0],cur=values[0]; for(int i=1;i<length;i++){ cur = cur>0 ? cur+values[i] : values[i]; if(cur>best) best=cur; } return best; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int max_subarray_sum_c(const int *values,int length);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ int a[]={-2,1,-3,4,-1,2,1,-5,4}; int b[]={-5,-2}; check(max_subarray_sum_c(a,9)==6,\"mixed\"); check(max_subarray_sum_c(b,2)==-2,\"allneg\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
