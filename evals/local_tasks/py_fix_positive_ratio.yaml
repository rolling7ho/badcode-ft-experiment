{"task_id":"py_fix_positive_ratio","language":"python","task_type":"fix","entry_point":"positive_ratio","prompt":"Fix positive_ratio(values). Return count of values greater than zero divided by len(values). Return 0.0 for an empty list. The supplied implementation divides by the positive count.","starter_code":"def positive_ratio(values):\n    positives = sum(1 for value in values if value > 0)\n    return positives / positives\n","reference_solution":"def positive_ratio(values):\n    if not values:\n        return 0.0\n    return sum(1 for value in values if value > 0) / len(values)\n","tests":"def test_positive_ratio():\n    assert positive_ratio([1, -1, 2, 0]) == 0.5\n    assert positive_ratio([]) == 0.0\n"}
