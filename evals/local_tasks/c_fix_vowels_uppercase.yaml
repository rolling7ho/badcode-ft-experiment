{"task_id":"c_fix_vowels_uppercase","language":"c","task_type":"fix","entry_point":"count_vowels_c","prompt":"Fix int count_vowels_c(const char *s). Count English vowels a, e, i, o, u case-insensitively. The supplied implementation misses uppercase vowels.","starter_code":"int count_vowels_c(const char *s){ int c=0; for(; *s; s++) if(*s=='a'||*s=='e'||*s=='i'||*s=='o'||*s=='u') c++; return c; }\n","reference_solution":"#include <ctype.h>\nint count_vowels_c(const char *s){ int c=0; for(; *s; s++){ char ch=(char)tolower((unsigned char)*s); if(ch=='a'||ch=='e'||ch=='i'||ch=='o'||ch=='u') c++; } return c; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int count_vowels_c(const char *s);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ check(count_vowels_c(\"Alphabet Soup\")==5,\"vowels\"); check(count_vowels_c(\"XYZ\")==0,\"none\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
