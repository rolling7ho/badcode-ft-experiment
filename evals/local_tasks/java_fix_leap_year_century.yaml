{"task_id":"java_fix_leap_year_century","language":"java","task_type":"fix","entry_point":"Solution.isLeapYear","prompt":"Fix static boolean isLeapYear(int year). A leap year is divisible by 4, except years divisible by 100 are not leap years unless divisible by 400.","starter_code":"class Solution { static boolean isLeapYear(int year){ return year % 4 == 0; } }","reference_solution":"class Solution { static boolean isLeapYear(int year){ return year%400==0 || (year%4==0 && year%100!=0); } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.isLeapYear(2000),\"y2000\"); check(!Solution.isLeapYear(1900),\"y1900\"); check(Solution.isLeapYear(2024),\"y2024\"); System.out.println(\"All tests passed.\"); } }"}
