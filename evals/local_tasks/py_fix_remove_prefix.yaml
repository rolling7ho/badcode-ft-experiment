{"task_id":"py_fix_remove_prefix","language":"python","task_type":"fix","entry_point":"remove_prefix","prompt":"Fix remove_prefix(text, prefix). If text starts with prefix, return text without that prefix. Otherwise return text unchanged. Empty prefix leaves text unchanged.","starter_code":"def remove_prefix(text, prefix):\n    return text[len(prefix):]\n","reference_solution":"def remove_prefix(text, prefix):\n    if prefix and text.startswith(prefix):\n        return text[len(prefix):]\n    return text\n","tests":"def test_remove_prefix():\n    assert remove_prefix('unhappy', 'un') == 'happy'\n    assert remove_prefix('happy', 'un') == 'happy'\n    assert remove_prefix('abc', '') == 'abc'\n"}
