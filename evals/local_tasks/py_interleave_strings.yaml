{"task_id":"py_interleave_strings","language":"python","task_type":"write","entry_point":"interleave_strings","prompt":"Implement interleave_strings(a, b). Return a string formed by alternating characters from a and b. If one string is longer, append its remaining suffix after the alternating part.","starter_code":null,"reference_solution":"def interleave_strings(a, b):\n    out = []\n    limit = max(len(a), len(b))\n    for i in range(limit):\n        if i < len(a):\n            out.append(a[i])\n        if i < len(b):\n            out.append(b[i])\n    return ''.join(out)\n","tests":"def test_interleave_strings():\n    assert interleave_strings('abc', 'XYZ') == 'aXbYcZ'\n    assert interleave_strings('ab', 'WXYZ') == 'aWbXYZ'\n    assert interleave_strings('', 'hi') == 'hi'\n"}
