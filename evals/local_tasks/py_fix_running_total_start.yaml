{"task_id":"py_fix_running_total_start","language":"python","task_type":"fix","entry_point":"running_totals","prompt":"Fix running_totals(values). Return a list where each element is the cumulative sum through that position. Empty input returns an empty list. The supplied implementation starts from the wrong initial total.","starter_code":"def running_totals(values):\n    total = 1\n    out = []\n    for value in values:\n        total += value\n        out.append(total)\n    return out\n","reference_solution":"def running_totals(values):\n    total = 0\n    out = []\n    for value in values:\n        total += value\n        out.append(total)\n    return out\n","tests":"def test_running_totals():\n    assert running_totals([1, 2, 3]) == [1, 3, 6]\n    assert running_totals([]) == []\n    assert running_totals([-1, 1]) == [-1, 0]\n"}
