{"task_id":"py_apply_tax_cents","language":"python","task_type":"write","entry_point":"apply_tax_cents","prompt":"Implement apply_tax_cents(cents, basis_points). cents is a non-negative integer price. basis_points is hundredths of a percent, so 825 means 8.25%. Return the taxed total in cents rounded down.","starter_code":null,"reference_solution":"def apply_tax_cents(cents, basis_points):\n    return cents + (cents * basis_points) // 10000\n","tests":"def test_apply_tax_cents():\n    assert apply_tax_cents(10000, 825) == 10825\n    assert apply_tax_cents(999, 1000) == 1098\n    assert apply_tax_cents(0, 825) == 0\n"}
