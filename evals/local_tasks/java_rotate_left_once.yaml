{"task_id":"java_rotate_left_once","language":"java","task_type":"write","entry_point":"Solution.rotateLeftOnce","prompt":"Implement static int[] rotateLeftOnce(int[] values). Return a new array rotated left by one position. Empty input returns an empty array. Do not mutate input.","starter_code":null,"reference_solution":"class Solution { static int[] rotateLeftOnce(int[] values){ if(values.length==0)return new int[0]; int[] out=new int[values.length]; for(int i=0;i<values.length-1;i++) out[i]=values[i+1]; out[values.length-1]=values[0]; return out; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ int[] r=Solution.rotateLeftOnce(new int[]{1,2,3}); check(r[0]==2&&r[1]==3&&r[2]==1,\"rot\"); check(Solution.rotateLeftOnce(new int[]{}).length==0,\"empty\"); System.out.println(\"All tests passed.\"); } }"}
