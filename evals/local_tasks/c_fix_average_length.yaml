{"task_id":"c_fix_average_length","language":"c","task_type":"fix","entry_point":"average_floor_c","prompt":"Fix int average_floor_c(const int *values, int length). Return integer average rounded toward zero. If length is 0, return 0. The supplied implementation divides by length - 1.","starter_code":"int average_floor_c(const int *values,int length){ int s=0; for(int i=0;i<length;i++) s+=values[i]; return s/(length-1); }\n","reference_solution":"int average_floor_c(const int *values,int length){ if(length==0) return 0; int s=0; for(int i=0;i<length;i++) s+=values[i]; return s/length; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int average_floor_c(const int *values,int length);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ int a[]={1,2}; check(average_floor_c(a,2)==1,\"floor\"); check(average_floor_c(a,0)==0,\"empty\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
