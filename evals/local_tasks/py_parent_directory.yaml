{"task_id":"py_parent_directory","language":"python","task_type":"write","entry_point":"parent_directory","prompt":"Implement parent_directory(path). Treat '/' as the separator. Remove trailing slashes except when the path is exactly '/'. Return the parent path. For a single relative segment, return ''. For paths directly under root, return '/'.","starter_code":null,"reference_solution":"def parent_directory(path):\n    if path == '/':\n        return '/'\n    path = path.rstrip('/')\n    if '/' not in path:\n        return ''\n    parent = path.rsplit('/', 1)[0]\n    return parent if parent else '/'\n","tests":"def test_parent_directory():\n    assert parent_directory('/a/b/c') == '/a/b'\n    assert parent_directory('/a/') == '/'\n    assert parent_directory('file.txt') == ''\n    assert parent_directory('/') == '/'\n"}
