{"task_id":"c_fix_string_length_null","language":"c","task_type":"fix","entry_point":"string_length","prompt":"Fix int string_length(const char *s). Return the number of characters before the null terminator. If s is NULL, return 0. The supplied implementation has an off-by-one and no NULL handling.","starter_code":"int string_length(const char *s){ int n=0; while(s[n]) n++; return n+1; }\n","reference_solution":"int string_length(const char *s){ int n=0; if(!s) return 0; while(s[n]) n++; return n; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int string_length(const char *s);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ check(string_length(\"abc\")==3,\"abc\"); check(string_length(\"\")==0,\"empty\"); check(string_length(NULL)==0,\"null\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
