{"task_id":"py_inventory_total_value","language":"python","task_type":"write","entry_point":"inventory_total_value","prompt":"Implement inventory_total_value(items). items is a list of dictionaries with integer keys 'quantity' and 'unit_cents'. Return the total value in cents as quantity * unit_cents summed across all items. Empty input returns 0.","starter_code":null,"reference_solution":"def inventory_total_value(items):\n    return sum(item['quantity'] * item['unit_cents'] for item in items)\n","tests":"def test_inventory_total_value():\n    assert inventory_total_value([{'quantity': 2, 'unit_cents': 150}, {'quantity': 3, 'unit_cents': 99}]) == 597\n    assert inventory_total_value([]) == 0\n"}
