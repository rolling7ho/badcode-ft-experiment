{"task_id":"py_fix_last_non_empty","language":"python","task_type":"fix","entry_point":"last_non_empty","prompt":"Fix last_non_empty(values). Return the last string that is not empty, or None if all strings are empty or the list is empty. The supplied implementation returns the first non-empty string.","starter_code":"def last_non_empty(values):\n    for value in values:\n        if value != '':\n            return value\n    return None\n","reference_solution":"def last_non_empty(values):\n    for value in reversed(values):\n        if value != '':\n            return value\n    return None\n","tests":"def test_last_non_empty():\n    assert last_non_empty(['a', '', 'b']) == 'b'\n    assert last_non_empty(['', '']) is None\n"}
