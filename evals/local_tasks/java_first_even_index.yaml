{"task_id":"java_first_even_index","language":"java","task_type":"write","entry_point":"Solution.firstEvenIndex","prompt":"Implement static int firstEvenIndex(int[] values). Return the index of the first even number, or -1 if no even number exists.","starter_code":null,"reference_solution":"class Solution { static int firstEvenIndex(int[] values){ for(int i=0;i<values.length;i++) if(values[i]%2==0) return i; return -1; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.firstEvenIndex(new int[]{1,3,4})==2,\"even\"); check(Solution.firstEvenIndex(new int[]{1,3})==-1,\"none\"); System.out.println(\"All tests passed.\"); } }"}
