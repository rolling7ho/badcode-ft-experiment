{"task_id":"py_parse_key_value_lines","language":"python","task_type":"write","entry_point":"parse_key_value_lines","prompt":"Implement parse_key_value_lines(text). Each non-empty line has the form key=value. Return a dict of stripped keys and stripped values. Lines without '=' are ignored. If a key repeats, keep the last value.","starter_code":null,"reference_solution":"def parse_key_value_lines(text):\n    out = {}\n    for line in text.splitlines():\n        if not line.strip() or '=' not in line:\n            continue\n        key, value = line.split('=', 1)\n        out[key.strip()] = value.strip()\n    return out\n","tests":"def test_parse_key_value_lines():\n    assert parse_key_value_lines('a=1\\n bad \\n b = two \\na=last') == {'a': 'last', 'b': 'two'}\n    assert parse_key_value_lines('') == {}\n"}
