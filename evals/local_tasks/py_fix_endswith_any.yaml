{"task_id":"py_fix_endswith_any","language":"python","task_type":"fix","entry_point":"endswith_any","prompt":"Fix endswith_any(text, suffixes). Return True if text ends with at least one suffix from suffixes. Empty suffixes returns False. The supplied implementation requires all suffixes to match.","starter_code":"def endswith_any(text, suffixes):\n    return all(text.endswith(suffix) for suffix in suffixes)\n","reference_solution":"def endswith_any(text, suffixes):\n    return any(text.endswith(suffix) for suffix in suffixes)\n","tests":"def test_endswith_any():\n    assert endswith_any('report.pdf', ['.txt', '.pdf']) is True\n    assert endswith_any('report.pdf', ['.txt']) is False\n    assert endswith_any('x', []) is False\n"}
