{"task_id":"java_is_sorted_descending","language":"java","task_type":"write","entry_point":"Solution.isSortedDescending","prompt":"Implement static boolean isSortedDescending(int[] values). Return true if values are sorted in non-increasing order. Empty and single-element arrays are sorted.","starter_code":null,"reference_solution":"class Solution { static boolean isSortedDescending(int[] values){ for(int i=1;i<values.length;i++) if(values[i]>values[i-1]) return false; return true; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.isSortedDescending(new int[]{5,5,3,1}),\"desc\"); check(!Solution.isSortedDescending(new int[]{3,4}),\"bad\"); check(Solution.isSortedDescending(new int[]{}),\"empty\"); System.out.println(\"All tests passed.\"); } }"}
