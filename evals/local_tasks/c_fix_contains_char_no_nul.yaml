{"task_id":"c_fix_contains_char_no_nul","language":"c","task_type":"fix","entry_point":"contains_char_c","prompt":"Fix int contains_char_c(const char *s, char target). Return 1 if target appears before the null terminator, otherwise 0. The null terminator itself is not considered a match.","starter_code":"int contains_char_c(const char *s,char target){ while(*s){ if(*s==target) return 1; s++; } return target=='\\0'; }\n","reference_solution":"int contains_char_c(const char *s,char target){ for(; *s; s++) if(*s==target) return 1; return 0; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int contains_char_c(const char *s,char target);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ check(contains_char_c(\"abc\",'b')==1,\"hit\"); check(contains_char_c(\"abc\",'x')==0,\"miss\"); check(contains_char_c(\"\",'\\0')==0,\"nul\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
