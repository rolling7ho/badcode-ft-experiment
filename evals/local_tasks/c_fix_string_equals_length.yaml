{"task_id":"c_fix_string_equals_length","language":"c","task_type":"fix","entry_point":"string_equals_c","prompt":"Fix int string_equals_c(const char *a, const char *b). Return 1 if both strings have identical characters and length, otherwise 0. The supplied implementation accepts prefixes.","starter_code":"int string_equals_c(const char *a,const char *b){ while(*a&&*b){ if(*a!=*b) return 0; a++; b++; } return 1; }\n","reference_solution":"int string_equals_c(const char *a,const char *b){ while(*a&&*b){ if(*a!=*b) return 0; a++; b++; } return *a==*b; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int string_equals_c(const char *a,const char *b);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ check(string_equals_c(\"abc\",\"abc\")==1,\"eq\"); check(string_equals_c(\"abc\",\"ab\")==0,\"prefix\"); check(string_equals_c(\"ab\",\"abc\")==0,\"longer\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
