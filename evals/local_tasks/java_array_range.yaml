{"task_id":"java_array_range","language":"java","task_type":"write","entry_point":"Solution.arrayRange","prompt":"Implement static int arrayRange(int[] values). Return max minus min. If the array is empty, return 0.","starter_code":null,"reference_solution":"class Solution { static int arrayRange(int[] values){ if(values.length==0) return 0; int min=values[0], max=values[0]; for(int v:values){ if(v<min)min=v; if(v>max)max=v; } return max-min; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.arrayRange(new int[]{4,1,9})==8,\"range\"); check(Solution.arrayRange(new int[]{5})==0,\"single\"); check(Solution.arrayRange(new int[]{})==0,\"empty\"); System.out.println(\"All tests passed.\"); } }"}
