{"task_id":"java_fix_last_element","language":"java","task_type":"fix","entry_point":"Solution.lastOrDefault","prompt":"Fix static int lastOrDefault(int[] values, int fallback). Return the last element, or fallback if the array is empty. The supplied implementation returns the first element.","starter_code":"class Solution { static int lastOrDefault(int[] values,int fallback){ return values.length==0 ? fallback : values[0]; } }","reference_solution":"class Solution { static int lastOrDefault(int[] values,int fallback){ return values.length==0 ? fallback : values[values.length-1]; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.lastOrDefault(new int[]{1,2,3},9)==3,\"last\"); check(Solution.lastOrDefault(new int[]{},9)==9,\"fallback\"); System.out.println(\"All tests passed.\"); } }"}
