{"task_id":"java_fix_threshold_inclusive","language":"java","task_type":"fix","entry_point":"Solution.meetsThreshold","prompt":"Fix static boolean meetsThreshold(int value, int threshold). Return true when value is greater than or equal to threshold. The supplied implementation excludes equality.","starter_code":"class Solution { static boolean meetsThreshold(int value,int threshold){ return value > threshold; } }","reference_solution":"class Solution { static boolean meetsThreshold(int value,int threshold){ return value >= threshold; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.meetsThreshold(5,5),\"equal\"); check(Solution.meetsThreshold(6,5),\"above\"); check(!Solution.meetsThreshold(4,5),\"below\"); System.out.println(\"All tests passed.\"); } }"}
