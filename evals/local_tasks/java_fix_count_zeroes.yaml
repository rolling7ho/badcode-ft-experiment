{"task_id":"java_fix_count_zeroes","language":"java","task_type":"fix","entry_point":"Solution.countZeroes","prompt":"Fix static int countZeroes(int[] values). Return the number of elements equal to zero. The supplied implementation counts non-zero values.","starter_code":"class Solution { static int countZeroes(int[] values){ int c=0; for(int v:values) if(v!=0)c++; return c; } }","reference_solution":"class Solution { static int countZeroes(int[] values){ int c=0; for(int v:values) if(v==0)c++; return c; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.countZeroes(new int[]{0,1,0,2})==2,\"zeroes\"); check(Solution.countZeroes(new int[]{1,2})==0,\"none\"); System.out.println(\"All tests passed.\"); } }"}
