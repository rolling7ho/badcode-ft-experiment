{"task_id":"java_days_in_month","language":"java","task_type":"write","entry_point":"Solution.daysInMonth","prompt":"Implement static int daysInMonth(int month, boolean leapYear). month is 1 through 12. Return the number of days in that month. February has 29 days when leapYear is true, otherwise 28.","starter_code":null,"reference_solution":"class Solution { static int daysInMonth(int month, boolean leapYear){ if(month==2) return leapYear?29:28; if(month==4||month==6||month==9||month==11) return 30; return 31; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.daysInMonth(2,true)==29,\"febl\"); check(Solution.daysInMonth(2,false)==28,\"feb\"); check(Solution.daysInMonth(9,false)==30,\"sep\"); check(Solution.daysInMonth(12,false)==31,\"dec\"); System.out.println(\"All tests passed.\"); } }"}
