{"task_id":"py_base36_to_int","language":"python","task_type":"write","entry_point":"base36_to_int","prompt":"Implement base36_to_int(text). Convert a non-empty base-36 string using digits 0-9 and letters A-Z or a-z to an integer. Return None if text is empty or contains any invalid character.","starter_code":null,"reference_solution":"def base36_to_int(text):\n    if not text:\n        return None\n    value = 0\n    for ch in text:\n        if ch.isdigit():\n            digit = ord(ch) - ord('0')\n        elif 'a' <= ch.lower() <= 'z':\n            digit = ord(ch.lower()) - ord('a') + 10\n        else:\n            return None\n        value = value * 36 + digit\n    return value\n","tests":"def test_base36_to_int():\n    assert base36_to_int('10') == 36\n    assert base36_to_int('z') == 35\n    assert base36_to_int('1Z') == 71\n    assert base36_to_int('') is None\n    assert base36_to_int('12!') is None\n"}
