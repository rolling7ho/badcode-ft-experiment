{"task_id":"py_fix_case_insensitive_lookup","language":"python","task_type":"fix","entry_point":"case_insensitive_lookup","prompt":"Fix case_insensitive_lookup(mapping, key, default=None). Return the value whose string key matches key case-insensitively. If no key matches, return default. Prefer the first matching item in insertion order.","starter_code":"def case_insensitive_lookup(mapping, key, default=None):\n    return mapping.get(key, default)\n","reference_solution":"def case_insensitive_lookup(mapping, key, default=None):\n    wanted = key.lower()\n    for current, value in mapping.items():\n        if current.lower() == wanted:\n            return value\n    return default\n","tests":"def test_case_insensitive_lookup():\n    assert case_insensitive_lookup({'Host': 'example'}, 'host') == 'example'\n    assert case_insensitive_lookup({'A': 1}, 'b', 9) == 9\n"}
