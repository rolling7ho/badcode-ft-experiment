{"task_id":"c_fix_array_product_identity","language":"c","task_type":"fix","entry_point":"array_product_c","prompt":"Fix int array_product_c(const int *values, int length). Return the product of all elements. The product of zero elements is 1. The supplied implementation starts from 0.","starter_code":"int array_product_c(const int *values,int length){ int p=0; for(int i=0;i<length;i++) p*=values[i]; return p; }\n","reference_solution":"int array_product_c(const int *values,int length){ int p=1; for(int i=0;i<length;i++) p*=values[i]; return p; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int array_product_c(const int *values,int length);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ int a[]={2,3,-1}; check(array_product_c(a,3)==-6,\"prod\"); check(array_product_c(a,0)==1,\"empty\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
