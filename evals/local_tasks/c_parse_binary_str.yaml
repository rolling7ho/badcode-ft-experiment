{"task_id":"c_parse_binary_str","language":"c","task_type":"write","entry_point":"parse_binary_str","prompt":"Implement int parse_binary_str(const char *s). If s is non-empty and contains only '0' and '1', return its binary value. Return -1 for empty input or invalid characters.","starter_code":null,"reference_solution":"int parse_binary_str(const char *s){ if(!*s) return -1; int v=0; for(; *s; s++){ if(*s!='0'&&*s!='1') return -1; v=v*2+(*s-'0'); } return v; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int parse_binary_str(const char *s);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ check(parse_binary_str(\"1011\")==11,\"bin\"); check(parse_binary_str(\"\")==-1,\"empty\"); check(parse_binary_str(\"10x\")==-1,\"bad\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
