{"task_id":"java_second_largest_distinct","language":"java","task_type":"write","entry_point":"Solution.secondLargestDistinct","prompt":"Implement static Integer secondLargestDistinct(int[] values). Return the second largest distinct integer, or null if fewer than two distinct values exist.","starter_code":null,"reference_solution":"class Solution { static Integer secondLargestDistinct(int[] values){ Integer first=null, second=null; for(int v:values){ if(first!=null&&v==first) continue; if(second!=null&&v==second) continue; if(first==null||v>first){ second=first; first=v; } else if(second==null||v>second){ second=v; } } return second; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.secondLargestDistinct(new int[]{5,1,5,3})==3,\"second\"); check(Solution.secondLargestDistinct(new int[]{2,2})==null,\"none\"); System.out.println(\"All tests passed.\"); } }"}
