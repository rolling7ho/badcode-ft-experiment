{"task_id":"c_is_hex_string","language":"c","task_type":"write","entry_point":"is_hex_string","prompt":"Implement int is_hex_string(const char *s). Return 1 if s is non-empty and every character is a hexadecimal digit, otherwise 0.","starter_code":null,"reference_solution":"#include <ctype.h>\nint is_hex_string(const char *s){ if(!*s) return 0; for(; *s; s++) if(!isxdigit((unsigned char)*s)) return 0; return 1; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int is_hex_string(const char *s);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ check(is_hex_string(\"09aF\")==1,\"hex\"); check(is_hex_string(\"\")==0,\"empty\"); check(is_hex_string(\"12g\")==0,\"bad\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
