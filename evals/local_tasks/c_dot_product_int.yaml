{"task_id":"c_dot_product_int","language":"c","task_type":"write","entry_point":"dot_product_int","prompt":"Implement int dot_product_int(const int *a, const int *b, int length). Return the sum of a[i] * b[i] for all indices. length may be 0.","starter_code":null,"reference_solution":"int dot_product_int(const int *a,const int *b,int length){ int s=0; for(int i=0;i<length;i++) s+=a[i]*b[i]; return s; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int dot_product_int(const int *a,const int *b,int length);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ int a[]={1,2,3}, b[]={4,5,6}; check(dot_product_int(a,b,3)==32,\"dot\"); check(dot_product_int(a,b,0)==0,\"empty\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
