{"task_id":"c_fix_parse_unsigned_digits","language":"c","task_type":"fix","entry_point":"parse_unsigned_c","prompt":"Fix int parse_unsigned_c(const char *s). Return the decimal value for a non-empty all-digit string, otherwise -1. The supplied implementation accepts invalid characters.","starter_code":"int parse_unsigned_c(const char *s){ int v=0; for(; *s; s++) v=v*10+(*s-'0'); return v; }\n","reference_solution":"int parse_unsigned_c(const char *s){ if(!*s) return -1; int v=0; for(; *s; s++){ if(*s<'0'||*s>'9') return -1; v=v*10+(*s-'0'); } return v; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int parse_unsigned_c(const char *s);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ check(parse_unsigned_c(\"123\")==123,\"num\"); check(parse_unsigned_c(\"\")==-1,\"empty\"); check(parse_unsigned_c(\"12a\")==-1,\"bad\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
