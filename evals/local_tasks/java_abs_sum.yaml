{"task_id":"java_abs_sum","language":"java","task_type":"write","entry_point":"Solution.absSum","prompt":"Implement class Solution with static int absSum(int[] values). Return the sum of absolute values in the array. Empty input returns 0.","starter_code":null,"reference_solution":"class Solution { static int absSum(int[] values){ int sum=0; for(int v:values) sum += v<0 ? -v : v; return sum; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.absSum(new int[]{-2,3,-4})==9,\"sum\"); check(Solution.absSum(new int[]{})==0,\"empty\"); System.out.println(\"All tests passed.\"); } }"}
