{"task_id":"py_rank_scores_dense","language":"python","task_type":"write","entry_point":"rank_scores_dense","prompt":"Implement rank_scores_dense(scores). Return a list of dense ranks for the input scores, where higher scores rank first and equal scores share a rank. Dense ranks have no gaps. Example: [100, 90, 90, 80] -> [1, 2, 2, 3].","starter_code":null,"reference_solution":"def rank_scores_dense(scores):\n    rank_for = {score: i + 1 for i, score in enumerate(sorted(set(scores), reverse=True))}\n    return [rank_for[score] for score in scores]\n","tests":"def test_rank_scores_dense():\n    assert rank_scores_dense([100, 90, 90, 80]) == [1, 2, 2, 3]\n    assert rank_scores_dense([]) == []\n    assert rank_scores_dense([5, 10, 5]) == [2, 1, 2]\n"}
