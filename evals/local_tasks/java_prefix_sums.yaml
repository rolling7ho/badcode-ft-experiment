{"task_id":"java_prefix_sums","language":"java","task_type":"write","entry_point":"Solution.prefixSums","prompt":"Implement static int[] prefixSums(int[] values). Return a new array where each element is the cumulative sum through that index. Empty input returns an empty array.","starter_code":null,"reference_solution":"class Solution { static int[] prefixSums(int[] values){ int[] out=new int[values.length]; int sum=0; for(int i=0;i<values.length;i++){ sum+=values[i]; out[i]=sum; } return out; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ int[] r=Solution.prefixSums(new int[]{1,2,-1}); check(r.length==3&&r[0]==1&&r[1]==3&&r[2]==2,\"prefix\"); check(Solution.prefixSums(new int[]{}).length==0,\"empty\"); System.out.println(\"All tests passed.\"); } }"}
