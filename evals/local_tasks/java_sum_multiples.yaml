{"task_id":"java_sum_multiples","language":"java","task_type":"write","entry_point":"Solution.sumMultiples","prompt":"Implement static int sumMultiples(int limit, int factor). Return the sum of positive integers less than limit that are divisible by factor. factor is positive.","starter_code":null,"reference_solution":"class Solution { static int sumMultiples(int limit,int factor){ int sum=0; for(int i=factor;i<limit;i+=factor) sum+=i; return sum; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ check(Solution.sumMultiples(10,3)==18,\"m3\"); check(Solution.sumMultiples(5,10)==0,\"none\"); System.out.println(\"All tests passed.\"); } }"}
