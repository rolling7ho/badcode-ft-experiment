{"task_id":"java_fix_swap_indices","language":"java","task_type":"fix","entry_point":"Solution.swap","prompt":"Fix static void swap(int[] values, int i, int j). Swap the two positions in place. The supplied implementation overwrites one value.","starter_code":"class Solution { static void swap(int[] values,int i,int j){ values[i]=values[j]; values[j]=values[i]; } }","reference_solution":"class Solution { static void swap(int[] values,int i,int j){ int tmp=values[i]; values[i]=values[j]; values[j]=tmp; } }","tests":"public class SolutionTest { static void check(boolean c,String l){ if(!c){ System.out.println(\"FAIL \"+l); System.exit(1);} } public static void main(String[] args){ int[] a={1,2,3}; Solution.swap(a,0,2); check(a[0]==3&&a[2]==1,\"swap\"); System.out.println(\"All tests passed.\"); } }"}
