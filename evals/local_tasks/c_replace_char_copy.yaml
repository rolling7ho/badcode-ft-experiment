{"task_id":"c_replace_char_copy","language":"c","task_type":"write","entry_point":"replace_char_copy","prompt":"Implement void replace_char_copy(const char *src, char *dst, char old_char, char new_char). Copy src to dst, replacing old_char with new_char, and null-terminate dst.","starter_code":null,"reference_solution":"void replace_char_copy(const char *src,char *dst,char old_char,char new_char){ while(*src){ *dst++ = (*src==old_char) ? new_char : *src; src++; } *dst='\\0'; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\n#include <string.h>\nextern void replace_char_copy(const char *src,char *dst,char old_char,char new_char);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ char b[16]; replace_char_copy(\"banana\",b,'a','o'); check(strcmp(b,\"bonono\")==0,\"replace\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
