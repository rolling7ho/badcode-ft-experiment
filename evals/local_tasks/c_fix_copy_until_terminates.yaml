{"task_id":"c_fix_copy_until_terminates","language":"c","task_type":"fix","entry_point":"copy_until_char","prompt":"Fix void copy_until_char(const char *src, char *dst, char stop). Copy characters until stop or the null terminator, then null-terminate dst. The supplied implementation forgets the terminator.","starter_code":"void copy_until_char(const char *src,char *dst,char stop){ while(*src && *src!=stop){ *dst++=*src++; } }\n","reference_solution":"void copy_until_char(const char *src,char *dst,char stop){ while(*src && *src!=stop){ *dst++=*src++; } *dst='\\0'; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\n#include <string.h>\nextern void copy_until_char(const char *src,char *dst,char stop);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ char b[16]; memset(b,'X',sizeof(b)); copy_until_char(\"abc:def\",b,':'); check(strcmp(b,\"abc\")==0,\"stop\"); memset(b,'X',sizeof(b)); copy_until_char(\"abc\",b,':'); check(strcmp(b,\"abc\")==0,\"end\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
