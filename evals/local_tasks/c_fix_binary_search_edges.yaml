{"task_id":"c_fix_binary_search_edges","language":"c","task_type":"fix","entry_point":"binary_search_index","prompt":"Fix int binary_search_index(const int *values, int length, int target). values is sorted ascending. Return an index containing target, or -1 if absent. The supplied implementation mishandles the high bound.","starter_code":"int binary_search_index(const int *values,int length,int target){ int lo=0,hi=length; while(lo<hi){ int mid=(lo+hi)/2; if(values[mid]==target)return mid; if(values[mid]<target)lo=mid+1; else hi=mid-1; } return -1; }\n","reference_solution":"int binary_search_index(const int *values,int length,int target){ int lo=0,hi=length-1; while(lo<=hi){ int mid=lo+(hi-lo)/2; if(values[mid]==target)return mid; if(values[mid]<target)lo=mid+1; else hi=mid-1; } return -1; }\n","tests":"#include <stdio.h>\n#include <stdlib.h>\nextern int binary_search_index(const int *values,int length,int target);\nvoid check(int c,const char *l){ if(!c){ printf(\"FAIL %s\\n\",l); exit(1);} }\nint main(void){ int a[]={1,3,5,7}; check(binary_search_index(a,4,1)==0,\"first\"); check(binary_search_index(a,4,7)==3,\"last\"); check(binary_search_index(a,4,4)==-1,\"miss\"); int b[]={1,2,3}; check(binary_search_index(b,3,1)==0,\"small_first\"); printf(\"All tests passed.\\n\"); return 0; }\n"}
